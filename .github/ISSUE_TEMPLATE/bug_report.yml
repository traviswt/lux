name: Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `redis-cli -p 6390`
        2. Execute `SET foo bar`
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Lux version
      placeholder: e.g. 0.2.2
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: Redis client used
      placeholder: e.g. ioredis, redis-py, redis-cli
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 15, Ubuntu 24.04, Docker
