name: luxctl Release

on:
  push:
    tags:
      - 'luxctl-v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: luxctl-linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            artifact: luxctl-linux-arm64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: luxctl-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup target add ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build (Linux musl)
        if: contains(matrix.target, 'linux-musl')
        run: cd cli && CC=musl-gcc cargo build --release --target ${{ matrix.target }}

      - name: Build (macOS)
        if: "!contains(matrix.target, 'linux-musl')"
        run: cd cli && cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp cli/target/${{ matrix.target }}/release/luxctl ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - run: |
          cd artifacts
          for f in luxctl-*; do
            tar czf "${f}.tar.gz" "$f"
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
